<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#06b6d4">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>

  <!-- LEFT SIDE: File chaos (Before) -->
  <g opacity="0.3">
    <text x="60" y="30" fill="#94a3b8" font-family="monospace" font-size="11" font-weight="bold">WITHOUT GRAQLE</text>
  </g>

  <!-- Scattered files -->
  <g filter="url(#glow)">
    <rect x="30" y="60" width="70" height="22" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="38" y="75" fill="#64748b" font-family="monospace" font-size="9">auth.py</text>

    <rect x="120" y="45" width="70" height="22" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="128" y="60" fill="#64748b" font-family="monospace" font-size="9">models.py</text>

    <rect x="50" y="100" width="70" height="22" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="58" y="115" fill="#64748b" font-family="monospace" font-size="9">routes.py</text>

    <rect x="140" y="90" width="70" height="22" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="148" y="105" fill="#64748b" font-family="monospace" font-size="9">utils.py</text>

    <rect x="30" y="140" width="70" height="22" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="38" y="155" fill="#64748b" font-family="monospace" font-size="9">config.py</text>

    <rect x="120" y="135" width="70" height="22" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="128" y="150" fill="#64748b" font-family="monospace" font-size="9">db.py</text>
  </g>

  <!-- Confused AI (reading files one by one) -->
  <g>
    <text x="75" y="195" fill="#ef4444" font-family="monospace" font-size="10" opacity="0.7">50,000 tokens</text>
    <text x="75" y="210" fill="#ef4444" font-family="monospace" font-size="10" opacity="0.7">~2 minutes</text>
    <text x="75" y="225" fill="#ef4444" font-family="monospace" font-size="10" opacity="0.7">"I think..."</text>
  </g>

  <!-- CENTER: Arrow / transformation -->
  <g filter="url(#glow-strong)">
    <!-- graq scan arrow -->
    <path d="M 240 120 L 310 120" stroke="url(#cyan)" stroke-width="2" stroke-dasharray="4 2">
      <animate attributeName="stroke-dashoffset" values="6;0" dur="1s" repeatCount="indefinite"/>
    </path>
    <polygon points="310,115 320,120 310,125" fill="#06b6d4"/>
    <text x="248" y="110" fill="#06b6d4" font-family="monospace" font-size="9" font-weight="bold">graq scan</text>
  </g>

  <!-- RIGHT SIDE: Knowledge Graph (After) -->
  <g opacity="0.3">
    <text x="500" y="30" fill="#06b6d4" font-family="monospace" font-size="11" font-weight="bold">WITH GRAQLE</text>
  </g>

  <!-- Graph nodes with animated connections -->
  <g filter="url(#glow)">
    <!-- Edges (connections) - animated -->
    <line x1="500" y1="100" x2="600" y2="70" stroke="#06b6d4" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="100" x2="420" y2="150" stroke="#a855f7" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="100" x2="580" y2="160" stroke="#f59e0b" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="600" y1="70" x2="680" y2="120" stroke="#10b981" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="420" y1="150" x2="480" y2="200" stroke="#06b6d4" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.2s" repeatCount="indefinite"/>
    </line>
    <line x1="580" y1="160" x2="680" y2="120" stroke="#a855f7" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.7s" repeatCount="indefinite"/>
    </line>
    <line x1="480" y1="200" x2="580" y2="160" stroke="#f59e0b" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite"/>
    </line>

    <!-- Node: auth (center, largest) -->
    <circle cx="500" cy="100" r="18" fill="#06b6d4" opacity="0.2"/>
    <circle cx="500" cy="100" r="12" fill="#06b6d4" opacity="0.8">
      <animate attributeName="r" values="12;14;12" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="500" y="104" fill="white" font-family="monospace" font-size="7" text-anchor="middle" font-weight="bold">auth</text>

    <!-- Node: models -->
    <circle cx="600" cy="70" r="10" fill="#a855f7" opacity="0.8">
      <animate attributeName="r" values="10;11;10" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <text x="600" y="74" fill="white" font-family="monospace" font-size="6" text-anchor="middle">models</text>

    <!-- Node: routes -->
    <circle cx="420" cy="150" r="10" fill="#f59e0b" opacity="0.8">
      <animate attributeName="r" values="10;11;10" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <text x="420" y="154" fill="white" font-family="monospace" font-size="6" text-anchor="middle">routes</text>

    <!-- Node: api -->
    <circle cx="580" cy="160" r="9" fill="#10b981" opacity="0.8">
      <animate attributeName="r" values="9;10;9" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <text x="580" y="164" fill="white" font-family="monospace" font-size="6" text-anchor="middle">api</text>

    <!-- Node: db -->
    <circle cx="680" cy="120" r="9" fill="#ec4899" opacity="0.8">
      <animate attributeName="r" values="9;10;9" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="680" y="124" fill="white" font-family="monospace" font-size="6" text-anchor="middle">db</text>

    <!-- Node: config -->
    <circle cx="480" cy="200" r="8" fill="#64748b" opacity="0.8"/>
    <text x="480" y="203" fill="white" font-family="monospace" font-size="6" text-anchor="middle">config</text>
  </g>

  <!-- Agent reasoning animation (message passing) -->
  <g>
    <circle cx="500" cy="100" r="4" fill="#06b6d4" opacity="0.8">
      <animate attributeName="cx" values="500;600;680;580;500" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;70;120;160;100" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#06b6d4;#a855f7;#ec4899;#10b981;#06b6d4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="150" r="3" fill="#f59e0b" opacity="0.6">
      <animate attributeName="cx" values="420;480;580;600;420" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;200;160;70;150" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Results panel -->
  <g>
    <rect x="350" y="240" width="400" height="130" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>

    <!-- Terminal header -->
    <rect x="350" y="240" width="400" height="24" rx="8" fill="#1e293b"/>
    <circle cx="366" cy="252" r="4" fill="#ef4444"/>
    <circle cx="380" cy="252" r="4" fill="#f59e0b"/>
    <circle cx="394" cy="252" r="4" fill="#10b981"/>
    <text x="420" y="256" fill="#64748b" font-family="monospace" font-size="9">graq run "what depends on auth?"</text>

    <!-- Output -->
    <text x="365" y="282" fill="#10b981" font-family="monospace" font-size="9">✓ 8 agents activated (graph-of-agents reasoning)</text>
    <text x="365" y="298" fill="#06b6d4" font-family="monospace" font-size="9">→ auth.py is consumed by: routes, api, middleware</text>
    <text x="365" y="314" fill="#06b6d4" font-family="monospace" font-size="9">→ Impact radius: 11 modules (3 direct, 8 transitive)</text>
    <text x="365" y="330" fill="#f59e0b" font-family="monospace" font-size="9">  Confidence: 92% | Cost: $0.0003 | Time: 5.2s</text>

    <!-- Stats comparison -->
    <text x="365" y="355" fill="#64748b" font-family="monospace" font-size="8">500 tokens (was 50,000) — 100x cheaper, 24x faster</text>
  </g>

  <!-- Bottom left: before stats -->
  <g>
    <rect x="20" y="260" width="200" height="110" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <text x="35" y="282" fill="#ef4444" font-family="monospace" font-size="9" font-weight="bold">❌ Without GraQle</text>
    <text x="35" y="300" fill="#64748b" font-family="monospace" font-size="8">Reads 60 files</text>
    <text x="35" y="315" fill="#64748b" font-family="monospace" font-size="8">50,000 tokens ($0.15)</text>
    <text x="35" y="330" fill="#64748b" font-family="monospace" font-size="8">2 minutes</text>
    <text x="35" y="345" fill="#64748b" font-family="monospace" font-size="8">"I think auth is used by..."</text>
    <text x="35" y="360" fill="#ef4444" font-family="monospace" font-size="8">No confidence score</text>
  </g>
</svg>
