<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="520">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="border-glow" x1="0" y1="0" x2="800" y2="520">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="edge-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="node-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer glow border — makes it POP against any dark background -->
  <rect x="1" y="1" width="798" height="518" rx="18" fill="none" stroke="url(#border-glow)" stroke-width="2"/>
  <rect x="3" y="3" width="794" height="514" rx="16" fill="url(#bg)"/>

  <!-- Subtle dot grid (not lines — classier) -->
  <g opacity="0.08" fill="#06b6d4">
    <circle cx="80" cy="60" r="1"/><circle cx="160" cy="60" r="1"/><circle cx="240" cy="60" r="1"/><circle cx="320" cy="60" r="1"/>
    <circle cx="80" cy="120" r="1"/><circle cx="160" cy="120" r="1"/><circle cx="240" cy="120" r="1"/><circle cx="320" cy="120" r="1"/>
    <circle cx="80" cy="180" r="1"/><circle cx="160" cy="180" r="1"/><circle cx="240" cy="180" r="1"/><circle cx="320" cy="180" r="1"/>
    <circle cx="480" cy="60" r="1"/><circle cx="560" cy="60" r="1"/><circle cx="640" cy="60" r="1"/><circle cx="720" cy="60" r="1"/>
    <circle cx="480" cy="120" r="1"/><circle cx="560" cy="120" r="1"/><circle cx="640" cy="120" r="1"/><circle cx="720" cy="120" r="1"/>
    <circle cx="480" cy="180" r="1"/><circle cx="560" cy="180" r="1"/><circle cx="640" cy="180" r="1"/><circle cx="720" cy="180" r="1"/>
    <circle cx="480" cy="240" r="1"/><circle cx="560" cy="240" r="1"/><circle cx="640" cy="240" r="1"/><circle cx="720" cy="240" r="1"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TOP ROW: Before → After side-by-side                       -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- LEFT: Scattered files (the problem) -->
  <g filter="url(#soft-shadow)">
    <rect x="20" y="20" width="340" height="270" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  </g>

  <text x="190" y="50" fill="#ef4444" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle" letter-spacing="1" opacity="0.9">WITHOUT GRAQLE</text>

  <!-- File cards in a messy grid -->
  <g>
    <rect x="35" y="68" width="100" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="85" y="88" fill="#cbd5e1" font-family="monospace" font-size="13" text-anchor="middle">auth.py</text>

    <rect x="148" y="63" width="110" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="203" y="83" fill="#cbd5e1" font-family="monospace" font-size="13" text-anchor="middle">models.py</text>

    <rect x="270" y="70" width="78" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="309" y="90" fill="#cbd5e1" font-family="monospace" font-size="13" text-anchor="middle">db.py</text>

    <rect x="40" y="110" width="105" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="92" y="130" fill="#cbd5e1" font-family="monospace" font-size="13" text-anchor="middle">routes.py</text>

    <rect x="158" y="107" width="90" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="203" y="127" fill="#cbd5e1" font-family="monospace" font-size="13" text-anchor="middle">utils.py</text>

    <rect x="260" y="112" width="90" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="305" y="132" fill="#cbd5e1" font-family="monospace" font-size="13" text-anchor="middle">api.py</text>

    <rect x="35" y="152" width="108" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="89" y="172" fill="#cbd5e1" font-family="monospace" font-size="13" text-anchor="middle">config.py</text>

    <rect x="155" y="150" width="140" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="225" y="170" fill="#cbd5e1" font-family="monospace" font-size="13" text-anchor="middle">middleware.py</text>
  </g>

  <!-- Question marks scattered — visual chaos -->
  <text x="85" y="210" fill="#ef4444" font-family="sans-serif" font-size="26" text-anchor="middle" opacity="0.15">?</text>
  <text x="200" y="225" fill="#ef4444" font-family="sans-serif" font-size="20" text-anchor="middle" opacity="0.12">?</text>
  <text x="300" y="205" fill="#ef4444" font-family="sans-serif" font-size="30" text-anchor="middle" opacity="0.1">?</text>

  <!-- Pain numbers — bold and clear -->
  <text x="190" y="220" fill="#ef4444" font-family="monospace" font-size="18" text-anchor="middle" font-weight="bold">50,000 tokens</text>
  <text x="190" y="245" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle" opacity="0.8">~2 min  ·  $0.15/query</text>
  <text x="190" y="270" fill="#64748b" font-family="monospace" font-size="14" text-anchor="middle" font-style="italic">"I think auth is used by..."</text>

  <!-- ═══ CENTER ARROW ═══ -->
  <g>
    <path d="M 374 155 L 430 155" stroke="#06b6d4" stroke-width="3" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" values="10;0" dur="0.7s" repeatCount="indefinite"/>
    </path>
    <polygon points="428,148 445,155 428,162" fill="#06b6d4">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
    <text x="410" y="140" fill="#06b6d4" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">graq</text>
    <text x="410" y="175" fill="#06b6d4" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">scan</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- RIGHT: Knowledge Graph — the solution                     -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <g filter="url(#soft-shadow)">
    <rect x="440" y="20" width="345" height="270" rx="14" fill="#0f172a" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
  </g>

  <text x="612" y="50" fill="#06b6d4" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle" letter-spacing="1">WITH GRAQLE</text>

  <!-- ═══ EDGES — animated, colored by relationship ═══ -->
  <g filter="url(#edge-glow)">
    <line x1="580" y1="110" x2="690" y2="82" stroke="#06b6d4" stroke-width="2" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.5;0.15" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="580" y1="110" x2="500" y2="160" stroke="#a855f7" stroke-width="2" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.5;0.15" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="580" y1="110" x2="650" y2="180" stroke="#f43f5e" stroke-width="2" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.5;0.15" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="580" y1="110" x2="700" y2="170" stroke="#f59e0b" stroke-width="2" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.2s" repeatCount="indefinite"/>
    </line>
    <line x1="690" y1="82" x2="755" y2="135" stroke="#10b981" stroke-width="2" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.5;0.15" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="690" y1="82" x2="700" y2="170" stroke="#a855f7" stroke-width="1.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="2.7s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="160" x2="650" y2="180" stroke="#06b6d4" stroke-width="1.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="160" x2="555" y2="235" stroke="#f59e0b" stroke-width="1.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="2.9s" repeatCount="indefinite"/>
    </line>
    <line x1="700" y1="170" x2="755" y2="135" stroke="#38bdf8" stroke-width="1.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <line x1="700" y1="170" x2="740" y2="225" stroke="#10b981" stroke-width="1.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="3.1s" repeatCount="indefinite"/>
    </line>
    <line x1="650" y1="180" x2="555" y2="235" stroke="#a855f7" stroke-width="1.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="2.6s" repeatCount="indefinite"/>
    </line>
    <line x1="650" y1="180" x2="740" y2="225" stroke="#f43f5e" stroke-width="1.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="3.3s" repeatCount="indefinite"/>
    </line>
    <line x1="755" y1="135" x2="740" y2="225" stroke="#f59e0b" stroke-width="1.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="2.3s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- ═══ 8 NODES — labels OUTSIDE on dark pills ═══ -->
  <g>
    <!-- 1: auth (hub — largest) -->
    <circle cx="580" cy="110" r="28" fill="#06b6d4" opacity="0.08"/>
    <circle cx="580" cy="110" r="20" fill="#06b6d4" opacity="0.9">
      <animate attributeName="r" values="20;23;20" dur="2s" repeatCount="indefinite"/>
    </circle>
    <rect x="556" y="136" width="48" height="18" rx="9" fill="#0f172a" stroke="#06b6d4" stroke-width="1" opacity="0.9"/>
    <text x="580" y="149" fill="#06b6d4" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">auth</text>

    <!-- 2: models -->
    <circle cx="690" cy="82" r="18" fill="#a855f7" opacity="0.9">
      <animate attributeName="r" values="18;20;18" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <rect x="660" y="105" width="60" height="18" rx="9" fill="#0f172a" stroke="#a855f7" stroke-width="1" opacity="0.9"/>
    <text x="690" y="118" fill="#a855f7" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">models</text>

    <!-- 3: routes -->
    <circle cx="500" cy="160" r="17" fill="#f59e0b" opacity="0.9">
      <animate attributeName="r" values="17;19;17" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <rect x="472" y="182" width="56" height="18" rx="9" fill="#0f172a" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
    <text x="500" y="195" fill="#f59e0b" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">routes</text>

    <!-- 4: api -->
    <circle cx="700" cy="170" r="16" fill="#10b981" opacity="0.9">
      <animate attributeName="r" values="16;18;16" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <rect x="684" y="191" width="32" height="18" rx="9" fill="#0f172a" stroke="#10b981" stroke-width="1" opacity="0.9"/>
    <text x="700" y="204" fill="#10b981" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">api</text>

    <!-- 5: db -->
    <circle cx="755" cy="135" r="15" fill="#ec4899" opacity="0.9">
      <animate attributeName="r" values="15;17;15" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <rect x="741" y="156" width="28" height="18" rx="9" fill="#0f172a" stroke="#ec4899" stroke-width="1" opacity="0.9"/>
    <text x="755" y="169" fill="#ec4899" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">db</text>

    <!-- 6: config -->
    <circle cx="555" cy="235" r="14" fill="#64748b" opacity="0.9">
      <animate attributeName="r" values="14;16;14" dur="3s" repeatCount="indefinite"/>
    </circle>
    <rect x="527" y="255" width="56" height="18" rx="9" fill="#0f172a" stroke="#64748b" stroke-width="1" opacity="0.9"/>
    <text x="555" y="268" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">config</text>

    <!-- 7: middleware -->
    <circle cx="650" cy="180" r="16" fill="#f43f5e" opacity="0.9">
      <animate attributeName="r" values="16;18;16" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <rect x="618" y="201" width="64" height="18" rx="9" fill="#0f172a" stroke="#f43f5e" stroke-width="1" opacity="0.9"/>
    <text x="650" y="214" fill="#f43f5e" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">middleware</text>

    <!-- 8: utils -->
    <circle cx="740" cy="225" r="14" fill="#38bdf8" opacity="0.9">
      <animate attributeName="r" values="14;16;14" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <rect x="718" y="245" width="44" height="18" rx="9" fill="#0f172a" stroke="#38bdf8" stroke-width="1" opacity="0.9"/>
    <text x="740" y="258" fill="#38bdf8" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">utils</text>
  </g>

  <!-- Agent reasoning particles -->
  <g>
    <circle r="5" fill="#06b6d4" opacity="0.95">
      <animate attributeName="cx" values="580;690;755;700;650;580" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="110;82;135;170;180;110" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#06b6d4;#a855f7;#ec4899;#10b981;#f43f5e;#06b6d4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#f59e0b" opacity="0.8">
      <animate attributeName="cx" values="500;555;740;690;580;500" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="160;235;225;82;110;160" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5" fill="#10b981" opacity="0.7">
      <animate attributeName="cx" values="700;755;740;650;555;700" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="170;135;225;180;235;170" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- BOTTOM: Terminal result — full width                      -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <g filter="url(#soft-shadow)">
    <rect x="20" y="310" width="760" height="190" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>

    <!-- Terminal chrome -->
    <rect x="20" y="310" width="760" height="34" rx="14" fill="#1e293b"/>
    <circle cx="42" cy="327" r="5.5" fill="#ef4444" opacity="0.8"/>
    <circle cx="60" cy="327" r="5.5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="78" cy="327" r="5.5" fill="#10b981" opacity="0.8"/>
    <text x="105" y="332" fill="#64748b" font-family="monospace" font-size="13">graq run "what depends on auth?"</text>

    <!-- Results — high contrast, generous spacing -->
    <text x="40" y="370" fill="#10b981" font-family="monospace" font-size="16" font-weight="bold">&#10003; 8 agents activated (graph-of-agents reasoning)</text>

    <text x="40" y="396" fill="#e2e8f0" font-family="monospace" font-size="14">&#8594; auth.py consumed by: routes, api, middleware</text>
    <text x="40" y="418" fill="#e2e8f0" font-family="monospace" font-size="14">&#8594; Impact radius: 11 modules (3 direct, 8 transitive)</text>

    <text x="40" y="448" fill="#f59e0b" font-family="monospace" font-size="17" font-weight="bold">92% confidence  ·  $0.0003  ·  5.2s</text>

    <line x1="40" y1="462" x2="750" y2="462" stroke="#1e293b" stroke-width="1"/>
    <text x="40" y="482" fill="#64748b" font-family="monospace" font-size="13">500 tokens (was 50,000)  ·  100x cheaper  ·  24x faster</text>
  </g>
</svg>
