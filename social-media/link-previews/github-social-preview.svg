<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="40%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="border-glow" x1="0" y1="0" x2="1280" y2="640">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="node-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="brand-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Radial glow behind the graph -->
    <radialGradient id="graph-aura" cx="850" cy="280" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background (full bleed, safe zone content starts at 40px) -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle radial aura behind graph area -->
  <rect width="1280" height="640" fill="url(#graph-aura)"/>

  <!-- Fine grid dots (subtle texture) -->
  <g opacity="0.04" fill="#06b6d4">
    <circle cx="120" cy="100" r="1.2"/><circle cx="240" cy="100" r="1.2"/><circle cx="360" cy="100" r="1.2"/><circle cx="480" cy="100" r="1.2"/>
    <circle cx="120" cy="200" r="1.2"/><circle cx="240" cy="200" r="1.2"/><circle cx="360" cy="200" r="1.2"/><circle cx="480" cy="200" r="1.2"/>
    <circle cx="120" cy="300" r="1.2"/><circle cx="240" cy="300" r="1.2"/><circle cx="360" cy="300" r="1.2"/><circle cx="480" cy="300" r="1.2"/>
    <circle cx="800" cy="100" r="1.2"/><circle cx="920" cy="100" r="1.2"/><circle cx="1040" cy="100" r="1.2"/><circle cx="1160" cy="100" r="1.2"/>
    <circle cx="800" cy="200" r="1.2"/><circle cx="920" cy="200" r="1.2"/><circle cx="1040" cy="200" r="1.2"/><circle cx="1160" cy="200" r="1.2"/>
    <circle cx="800" cy="300" r="1.2"/><circle cx="920" cy="300" r="1.2"/><circle cx="1040" cy="300" r="1.2"/><circle cx="1160" cy="300" r="1.2"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEFT COLUMN: Brand + Copy (within 40px safe zone)      -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Brand -->
  <text x="70" y="115" fill="#06b6d4" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="800" letter-spacing="-2" filter="url(#brand-glow)">GraQle</text>

  <!-- Tagline -->
  <text x="70" y="165" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400">Query your architecture, not your files.</text>

  <!-- Subtext -->
  <text x="70" y="205" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="17">Build a knowledge graph from any codebase. AI-powered reasoning</text>
  <text x="70" y="228" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="17">with confidence scores. 14 LLM backends. Fully offline capable.</text>

  <!-- Feature pills row -->
  <g>
    <rect x="70" y="255" width="150" height="30" rx="15" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.35"/>
    <text x="145" y="275" fill="#06b6d4" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Knowledge Graph</text>

    <rect x="232" y="255" width="140" height="30" rx="15" fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-width="1" stroke-opacity="0.35"/>
    <text x="302" y="275" fill="#a855f7" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Impact Analysis</text>

    <rect x="384" y="255" width="130" height="30" rx="15" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="1" stroke-opacity="0.35"/>
    <text x="449" y="275" fill="#10b981" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">MCP Server</text>
  </g>

  <!-- Stats -->
  <g>
    <text x="70" y="330" fill="#f59e0b" font-family="monospace" font-size="32" font-weight="bold">100x</text>
    <text x="215" y="330" fill="#64748b" font-family="system-ui, sans-serif" font-size="17">cheaper</text>

    <rect x="290" y="310" width="1" height="28" fill="#334155"/>

    <text x="310" y="330" fill="#10b981" font-family="monospace" font-size="32" font-weight="bold">24x</text>
    <text x="410" y="330" fill="#64748b" font-family="system-ui, sans-serif" font-size="17">faster</text>

    <rect x="475" y="310" width="1" height="28" fill="#334155"/>

    <text x="495" y="330" fill="#38bdf8" font-family="monospace" font-size="32" font-weight="bold">92%</text>
    <text x="595" y="330" fill="#64748b" font-family="system-ui, sans-serif" font-size="17">confidence</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- RIGHT SIDE: Knowledge Graph Visualization               -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Graph panel -->
  <g filter="url(#soft-shadow)">
    <rect x="700" y="55" width="530" height="310" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <rect x="700" y="55" width="530" height="310" rx="16" fill="none" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.15"/>
  </g>

  <!-- Edges -->
  <g opacity="0.35">
    <!-- Hub connections (auth) -->
    <line x1="880" y1="175" x2="1020" y2="130" stroke="#06b6d4" stroke-width="2.5"/>
    <line x1="880" y1="175" x2="775" y2="235" stroke="#a855f7" stroke-width="2.5"/>
    <line x1="880" y1="175" x2="970" y2="260" stroke="#f43f5e" stroke-width="2"/>
    <line x1="880" y1="175" x2="1050" y2="230" stroke="#f59e0b" stroke-width="2"/>
    <!-- Secondary connections -->
    <line x1="1020" y1="130" x2="1130" y2="185" stroke="#10b981" stroke-width="2"/>
    <line x1="1020" y1="130" x2="1050" y2="230" stroke="#a855f7" stroke-width="1.5"/>
    <line x1="775" y1="235" x2="970" y2="260" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="775" y1="235" x2="850" y2="320" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="1050" y1="230" x2="1130" y2="185" stroke="#38bdf8" stroke-width="1.5"/>
    <line x1="1050" y1="230" x2="1120" y2="310" stroke="#10b981" stroke-width="1.5"/>
    <line x1="970" y1="260" x2="850" y2="320" stroke="#a855f7" stroke-width="1.5"/>
    <line x1="970" y1="260" x2="1120" y2="310" stroke="#f43f5e" stroke-width="1.5"/>
    <line x1="1130" y1="185" x2="1120" y2="310" stroke="#f59e0b" stroke-width="1.5"/>
  </g>

  <!-- Nodes -->
  <g>
    <!-- auth (hub — largest, pulsing outer ring) -->
    <circle cx="880" cy="175" r="34" fill="#06b6d4" opacity="0.08"/>
    <circle cx="880" cy="175" r="25" fill="#06b6d4" opacity="0.9"/>
    <rect x="852" y="207" width="56" height="22" rx="11" fill="#0f172a" stroke="#06b6d4" stroke-width="1" opacity="0.95"/>
    <text x="880" y="222" fill="#06b6d4" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">auth</text>

    <!-- models -->
    <circle cx="1020" cy="130" r="22" fill="#a855f7" opacity="0.9"/>
    <rect x="987" y="157" width="66" height="20" rx="10" fill="#0f172a" stroke="#a855f7" stroke-width="1" opacity="0.95"/>
    <text x="1020" y="171" fill="#a855f7" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">models</text>

    <!-- routes -->
    <circle cx="775" cy="235" r="20" fill="#f59e0b" opacity="0.9"/>
    <rect x="745" y="260" width="60" height="20" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="1" opacity="0.95"/>
    <text x="775" y="274" fill="#f59e0b" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">routes</text>

    <!-- api -->
    <circle cx="1050" cy="230" r="19" fill="#10b981" opacity="0.9"/>
    <rect x="1032" y="254" width="36" height="20" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="1" opacity="0.95"/>
    <text x="1050" y="268" fill="#10b981" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">api</text>

    <!-- db -->
    <circle cx="1130" cy="185" r="18" fill="#ec4899" opacity="0.9"/>
    <rect x="1114" y="208" width="32" height="20" rx="10" fill="#0f172a" stroke="#ec4899" stroke-width="1" opacity="0.95"/>
    <text x="1130" y="222" fill="#ec4899" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">db</text>

    <!-- middleware -->
    <circle cx="970" cy="260" r="19" fill="#f43f5e" opacity="0.9"/>
    <rect x="932" y="284" width="76" height="20" rx="10" fill="#0f172a" stroke="#f43f5e" stroke-width="1" opacity="0.95"/>
    <text x="970" y="298" fill="#f43f5e" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">middleware</text>

    <!-- config -->
    <circle cx="850" cy="320" r="16" fill="#64748b" opacity="0.9"/>
    <rect x="823" y="340" width="54" height="18" rx="9" fill="#0f172a" stroke="#64748b" stroke-width="1" opacity="0.95"/>
    <text x="850" y="353" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">config</text>

    <!-- utils -->
    <circle cx="1120" cy="310" r="16" fill="#38bdf8" opacity="0.9"/>
    <rect x="1097" y="330" width="46" height="18" rx="9" fill="#0f172a" stroke="#38bdf8" stroke-width="1" opacity="0.95"/>
    <text x="1120" y="343" fill="#38bdf8" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">utils</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BOTTOM: Terminal strip (full width within safe zone)    -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <g filter="url(#soft-shadow)">
    <rect x="55" y="390" width="1170" height="200" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>

    <!-- Terminal chrome bar -->
    <rect x="55" y="390" width="1170" height="36" rx="14" fill="#1e293b"/>
    <rect x="55" y="412" width="1170" height="14" fill="#1e293b"/>
    <circle cx="80" cy="408" r="6" fill="#ef4444" opacity="0.8"/>
    <circle cx="100" cy="408" r="6" fill="#f59e0b" opacity="0.8"/>
    <circle cx="120" cy="408" r="6" fill="#10b981" opacity="0.8"/>
    <text x="150" y="413" fill="#64748b" font-family="monospace" font-size="14">$ graq run "what depends on auth?"</text>

    <!-- Result lines -->
    <text x="80" y="455" fill="#10b981" font-family="monospace" font-size="17" font-weight="bold">&#10003; 8 agents activated (graph-of-agents reasoning)</text>

    <text x="80" y="485" fill="#e2e8f0" font-family="monospace" font-size="15">&#8594; auth.py consumed by: routes, api, middleware</text>
    <text x="80" y="510" fill="#e2e8f0" font-family="monospace" font-size="15">&#8594; Impact radius: 11 modules (3 direct, 8 transitive)</text>

    <text x="80" y="545" fill="#f59e0b" font-family="monospace" font-size="19" font-weight="bold">92% confidence  &#183;  $0.0003  &#183;  5.2s</text>

    <line x1="80" y1="558" x2="1195" y2="558" stroke="#1e293b" stroke-width="1"/>
    <text x="80" y="578" fill="#64748b" font-family="monospace" font-size="14">500 tokens (was 50,000)  &#183;  100x cheaper  &#183;  24x faster</text>
  </g>

  <!-- Bottom-left: install badge -->
  <rect x="70" y="365" width="180" height="20" rx="10" fill="none"/>
  <text x="70" y="380" fill="#475569" font-family="monospace" font-size="13">pip install graqle</text>

  <!-- Bottom-right: compatibility -->
  <text x="590" y="380" fill="#475569" font-family="system-ui, sans-serif" font-size="13">Works with Claude Code &#183; Cursor &#183; VS Code Copilot</text>
</svg>
