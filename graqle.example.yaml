model:
  backend: api
  model: claude-haiku-4-5-20251001

graph:
  connector: json

activation:
  strategy: chunk    # "chunk" (default, recommended), "pcst" (legacy), "full", "top_k"
  max_nodes: 20

orchestration:
  max_rounds: 5
  convergence_threshold: 0.95
  aggregation: weighted_synthesis

observer:
  enabled: true
  detect_conflicts: true
  detect_anomalies: true

cost:
  budget_per_query: 0.10   # $0.10 recommended for ChunkScorer with 20 nodes
  prefer_local: true
  fallback_to_api: true

logging:
  level: INFO
  trace_messages: true
