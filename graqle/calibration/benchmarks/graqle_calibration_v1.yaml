 question: In GraQle's message passing implementation, how does the convergence check prevent infinite loops, and which module
 enforces the iteration ceiling?
 expected_answer: Message passing iterates over the activated subgraph, propagating node importance scores through edges.
 Convergence is checked after each iteration by comparing the change in node score vectors between successive iterations
 against a configured delta threshold â€” if the maximum per-node score change falls below the threshold, the loop terminates.
 An absolute iteration ceiling (configurable, defaulting to a fixed number of rounds) is enforced by the graph.py Graqle
 class as a safety guard independent of convergence â€” if the ceiling is reached before convergence, iteration stops and
 the current scores are used. This prevents infinite loops in graphs with cyclic structures or slow-converging topologies.
 canonical_variants:
 - 'convergence check: delta threshold on per-node score change; iteration ceiling in graph.py Graqle as absolute safety
 guard'
