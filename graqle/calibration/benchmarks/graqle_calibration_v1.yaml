- id: R11-BQ-135
 question: How do the PCST and chunk activation strategies in Graqle differ in terms of what graph nodes they select and
 when each is preferred?
 expected_answer: PCST (Prize-Collecting Steiner Tree) selects a connected subgraph that maximises relevance prizes while
 minimising edge costs, preserving causal and structural connectivity between activated nodes. Chunk activation splits
 the graph into contiguous segments and returns the highest-scoring chunk around the query anchor. PCST is preferred when
 structural relationships between nodes matter for the answer; chunk activation is preferred for localised lookups where
 proximity to the anchor is the primary signal and the overhead of tree optimisation is unnecessary.
