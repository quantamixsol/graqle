- id: R11-BQ-032
 question: Before the EU AI Act, the primary EU-level AI governance instrument was the non-binding AI Ethics Guidelines from
 the High-Level Expert Group. Are those guidelines superseded by the EU AI Act?
 expected_answer: Yes. The EU AI Act (Regulation 2024/1689) is binding EU law and supersedes the non-binding 2019 Ethics
 Guidelines for Trustworthy AI from the High-Level Expert Group on AI. The Regulation establishes mandatory legal obligations.
 The HLEG guidelines remain as soft-law reference material but carry no legal force where the AI Act applies.
 canonical_variants:
 - Do the HLEG AI Ethics Guidelines still have legal force after the EU AI Act?
 - Has the EU AI Act replaced the High-Level Expert Group AI Ethics Guidelines?
 expected_tool: graq_reason
 answer_type: boolean
 difficulty: medium
 domain: regulatory
 expected_band: 2
 cross_kg: false
 source: EU AI Act (Regulation 2024/1689); HLEG Ethics Guidelines 2019
 notes: 'Temporal/authority trap: some practitioners conflate soft-law HLEG guidelines with binding regulation. The correct
 answer is Yes â€” the Act supersedes them legally, though the guidelines inform interpretation.'
 is_answerable: true
