 question: In GraQle, what is the sequence of module interactions from the moment graq_reason receives a user query until
 a ReasoningResult is returned?
 expected_answer: 'graq_reason invokes the Graqle class in graph.py. The sequence is: (1) the query is embedded using the
 configured embedding model; (2) the anchor node is identified via semantic similarity search in the graph; (3) chunk scores
 are computed for retrieved text segments; (4) PCST activation runs from the anchor node using chunk scores as prizes to
 select a connected subgraph; (5) message passing propagates activation signals through the selected subgraph for a configured
 number of iterations until convergence; (6) the activated node set is passed to the STG (Structured Text Generator) which
 generates reasoning outputs per node class (I-IV); (7) multiple reasoning agents score the generated hypotheses; (8) inter-agent
 agreement is computed and used to derive answer_confidence; (9) the result is assembled into a ReasoningResult (types.py)
 and returned.'
