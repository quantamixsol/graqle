 this prohibition become enforceable?
 expected_answer: Article 5 prohibitions became enforceable 6 months after entry into force of the EU AI Act. The Act entered
 into force on 1 August 2024, making Article 5 applicable from 2 February 2025.
 canonical_variants:
 - When do EU AI Act Article 5 prohibited practices become enforceable?
 - What is the enforcement date for AI practice prohibitions under Article 5?
 expected_tool: graq_reason
 answer_type: free_text
 difficulty: medium
 domain: regulatory
 expected_band: 2
 cross_kg: false
