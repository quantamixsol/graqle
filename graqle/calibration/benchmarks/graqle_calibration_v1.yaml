 explanation to the data subject. Article 17 erasure: the controller must erase the data without undue delay if conditions
 are met, also within one month under Article 12(3). A practical approach is to provide the portable copy first and then
 perform erasure, since erasure of the data before providing a portable copy would make the portability request impossible
