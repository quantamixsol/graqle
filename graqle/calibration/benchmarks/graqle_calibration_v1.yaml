 question: When graq_impact computes the blast radius of a change, how does it determine the set of affected nodes and what
 is the role of edge directionality in that computation?
 expected_answer: 'graq_impact identifies the target node from the change description, then performs a graph traversal following
 outgoing edges (consumer direction) from the target node. Each node reachable by following ''consumes'' or ''depends_on''
 edges from the target is counted as affected. Edge directionality is critical: traversal follows edges in the direction
 of dependency consumption (target â†’ consumer), not the reverse. Nodes that the target depends on (its own dependencies,
 reached by reversing edges) are not in the blast radius â€” they are upstream, not downstream. The result is a set of
 downstream consumer nodes, ranked by traversal depth to indicate proximity of impact.'
 canonical_variants:
