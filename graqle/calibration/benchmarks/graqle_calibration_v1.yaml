 still apply to processing operations that began before 25 May 2018 if the data is still held today?
 expected_answer: No. GDPR applies to all ongoing processing of personal data from 25 May 2018 regardless of when the processing
 began. Directive 95/46/EC was repealed by GDPR Article 94. Controllers must comply with GDPR for all current processing,
 including data collected before 2018.
 canonical_variants:
 - Does Directive 95/46/EC still govern pre-2018 data if it is still being processed today?
 - Can a controller invoke the old Data Protection Directive for data collected before GDPR?
