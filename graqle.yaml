# Graqle configuration — dogfooding on the Graqle SDK itself
# "Evolving Graqle with Graqle"

graph:
  connector: neo4j
  uri: bolt://localhost:7687
  username: neo4j
  password: ${NEO4J_PASSWORD}  # Set via environment variable
  database: graqle
  path: graqle.json  # JSON fallback if Neo4j unavailable
  auto_grow: true

model:
  backend: bedrock
  model: eu.anthropic.claude-sonnet-4-6-v1:0
  region: eu-central-1

activation:
  strategy: top_k
  top_k: 15
  embedding_engine: simple

scan:
  docs:
    enabled: true
    background: true
    extensions: [".md", ".txt", ".pdf"]
    exclude_patterns:
      - "node_modules/"
      - "dist/"
      - "__pycache__/"
      - ".git/"
      - "*.pyc"
      - ".gcc/"
      - ".gsm/external/"
    scan_dirs: ["."]
    max_file_size_mb: 25
    chunk_max_chars: 1500
    linking:
      exact: true
      fuzzy: true
      semantic: false
    redaction:
      enabled: true

server:
  port: 8077
  host: 127.0.0.1
