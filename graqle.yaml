# Graqle configuration — dogfooding on the Graqle SDK itself
# "Evolving Graqle with Graqle"
#
# REASONING ACCOUNT (cost tracking):
#   The `reason` task is routed to eu.anthropic.claude-opus-4-6-v1
#   on AWS account REDACTED_ACCOUNT_ID (profile: cbs-dpt, region: eu-north-1).
#   All other tasks use the default model on the existing account.
#   Infrastructure (Lambda, Amplify, deployments) is UNCHANGED — still
#   on the existing account. Only Graqle SDK reasoning calls use cbs-dpt.
#   AWS_PROFILE=cbs-dpt is set in .env — this only affects boto3 calls
#   made by the Graqle SDK, not the deployment pipeline.

graph:
  connector: neo4j
  uri: bolt://localhost:7687
  username: neo4j
  password: ${NEO4J_PASSWORD}  # Set via environment variable
  database: graqle
  path: graqle_backup_20260327_pre_v0371_validation.json  # JSON fallback if Neo4j unavailable
  auto_grow: true

model:
  backend: bedrock
  model: eu.anthropic.claude-sonnet-4-6
  region: eu-north-1

routing:
  default_provider: bedrock
  default_model: eu.anthropic.claude-sonnet-4-6
  rules:
    - task: reason
      provider: bedrock
      model: eu.anthropic.claude-opus-4-6-v1
      region: eu-north-1
      profile: cbs-dpt
      reason: "Deep graph reasoning — Opus 4.6 on account REDACTED_ACCOUNT_ID (cbs-dpt) for cost tracking"
    - task: predict
      provider: bedrock
      model: eu.anthropic.claude-opus-4-6-v1
      region: eu-north-1
      profile: cbs-dpt
      reason: "Compound prediction + fold-back — Opus 4.6 on cbs-dpt"

activation:
  strategy: top_k
  top_k: 15
  embedding_engine: simple

scan:
  docs:
    enabled: true
    background: true
    extensions: [".md", ".txt", ".pdf"]
    exclude_patterns:
      - "node_modules/"
      - "dist/"
      - "__pycache__/"
      - ".git/"
      - "*.pyc"
      - ".gcc/"
      - ".gsm/external/"
    scan_dirs: ["."]
    max_file_size_mb: 25
    chunk_max_chars: 1500
    linking:
      exact: true
      fuzzy: true
      semantic: false
    redaction:
      enabled: true

server:
  port: 8077
  host: 127.0.0.1
