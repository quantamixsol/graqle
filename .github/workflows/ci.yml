name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff (auto-fix + report)
        run: |
          ruff check --fix graqle/ tests/ || true
          echo "Lint complete (warnings reported, not blocking)"

      - name: Run tests with coverage
        run: |
          pytest --cov=graqle --cov-report=xml --cov-report=term -q \
            --ignore=tests/test_activation/test_pcst.py \
            --ignore=tests/test_activation/test_content_aware_pcst.py \
            --ignore=tests/test_activation/test_relevance_chunks.py \
            --ignore=tests/test_activation/test_adaptive.py \
            --ignore=tests/test_ontology/test_constraint_graph.py \
            --ignore=tests/test_ontology/test_governance_v3.py \
            --ignore=tests/test_ontology/test_ontology_generator.py \
            --ignore=tests/test_ontology/test_semantic_shacl_gate.py \
            --ignore=tests/test_learning/test_gds_intelligence.py \
            --ignore=tests/test_learning/test_activation_memory.py \
            --ignore=tests/test_integration/test_ollama_e2e.py

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  smoke:
    name: Smoke test (fresh install)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install from built wheel (clean venv)
        run: |
          python -m pip install --upgrade pip build
          python -m build
          pip install dist/*.whl

      - name: Smoke test CLI
        run: |
          graq --version
          graq --help
          graq doctor --verbose || true
          graq config --json || true

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC) — no token needed

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build reproducible package
        env:
          SOURCE_DATE_EPOCH: "1704067200"
        run: python -m build

      # Supply-chain safety: block publish if wheel contains .pth files.
      # .pth files auto-execute at Python startup without any import —
      # this is the exact mechanism used in the LiteLLM supply-chain attack.
      - name: Audit wheel for .pth files (LiteLLM-class attack prevention)
        run: |
          python - <<'PYEOF'
          import zipfile, sys, pathlib
          wheels = list(pathlib.Path("dist").glob("*.whl"))
          if not wheels:
              print("ERROR: no wheel found in dist/", file=sys.stderr)
              sys.exit(1)
          failed = False
          for whl in wheels:
              with zipfile.ZipFile(whl) as z:
                  pth_files = [n for n in z.namelist() if n.endswith(".pth")]
                  if pth_files:
                      print(f"FAIL: .pth files found in {whl.name}: {pth_files}", file=sys.stderr)
                      failed = True
                  else:
                      print(f"PASS: {whl.name} — no .pth files")
          if failed:
              sys.exit(1)
          PYEOF

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        # No 'password' field — uses OIDC Trusted Publishing.
        # To enable: pypi.org → graqle project → Publishing → Add Trusted Publisher
        # (GitHub, org: quantamixsol, repo: graqle, workflow: ci.yml)
