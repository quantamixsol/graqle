# CG-MKT-06 — Weekly EUR-Lex authoritative-source drift guard
#
# Runs once a week to verify that every EUR-Lex URL referenced in
# docs/compliance/ still serves the same content (SHA-256) as the
# committed baseline at .graqle/eur-lex-baseline.json. If any URL
# has drifted, a GitHub Issue is opened so the compliance team can
# review what the regulator changed.
#
# Manual run: workflow_dispatch trigger. Use this after a release
# or after pulling in EUR-Lex doc edits.
#
# References:
#   - graqle/compliance/eur_lex_guard.py
#   - .gsm/decisions/ADR-MARKETING-001-summary.md §11

name: EUR-Lex drift weekly

on:
  schedule:
    # Mondays at 06:00 UTC — early enough for the compliance team to
    # see drift before the weekly release rhythm.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  eur-lex-check:
    name: Check EUR-Lex authoritative-source drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write    # for posting drift reports as issues
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GraQle SDK (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run EUR-Lex drift check
        id: eur_lex_check
        continue-on-error: true
        run: |
          graq compliance eur-lex-check \
              --docs-dir docs/compliance \
              --baseline .graqle/eur-lex-baseline.json \
              > eur_lex_report.json

      - name: Save drift report as artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eur-lex-report
          path: eur_lex_report.json
          retention-days: 90

      - name: Post drift issue (only when drift detected)
        if: steps.eur_lex_check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## EUR-Lex authoritative-source drift detected\n\n';
            body += 'One or more EUR-Lex URLs referenced under `docs/compliance/` ';
            body += 'no longer match the committed baseline at `.graqle/eur-lex-baseline.json`. ';
            body += 'Per CG-MKT-06, a human must review what the regulator changed ';
            body += 'before the docs / baseline are updated.\n\n';
            body += '### Drift report\n\n```json\n';
            try {
              body += fs.readFileSync('eur_lex_report.json', 'utf8');
            } catch (e) {
              body += `(unable to read report: ${e.message})`;
            }
            body += '\n```\n\n';
            body += '### Action items\n\n';
            body += '1. Open each drifted URL in the report and read what changed.\n';
            body += '2. If the change is substantive, update the relevant doc in `docs/compliance/eu-ai-act/`.\n';
            body += '3. Once the docs are updated (or the change confirmed inconsequential), run:\n';
            body += '   ```bash\n';
            body += '   graq compliance eur-lex-refresh\n';
            body += '   git add .graqle/eur-lex-baseline.json\n';
            body += '   git commit -m "compliance: refresh EUR-Lex baseline after regulator-side change"\n';
            body += '   ```\n';
            body += '4. Close this issue.\n';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `EUR-Lex drift detected (${new Date().toISOString().slice(0,10)})`,
              body: body,
              labels: ['compliance', 'eur-lex-drift'],
            });

      - name: Fail the workflow if drift detected
        if: steps.eur_lex_check.outcome == 'failure'
        run: |
          echo "EUR-Lex drift detected — see opened issue."
          exit 1
